    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      .root-loading {
        position: fixed;
        inset: 0;
        background: #0d0d0d;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: 'Courier New', monospace;
      }

      .root-loading::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(245, 160, 32, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 160, 32, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: grid-move 8s linear infinite;
      }

      @keyframes grid-move {
        0%   { transform: translateY(0); }
        100% { transform: translateY(40px); }
      }

      .root-loading::after {
        content: '';
        position: absolute;
        left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(245, 160, 32, 0.6), transparent);
        animation: scan 3s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(245, 160, 32, 0.4);
      }

      @keyframes scan {
        0%   { top: -2px; opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      .corner {
        position: absolute;
        width: 20px; height: 20px;
        border-color: rgba(245, 160, 32, 0.5);
        border-style: solid;
      }
      .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
      .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
      .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
      .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

      .root-loading-wrap {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        z-index: 1;
      }

      .hex-ring {
        position: relative;
        width: 100px;
        height: 100px;
      }

      .hex-ring svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .hex-ring .ring1 {
        animation: spin 4s linear infinite;
        transform-origin: center;
      }
      .hex-ring .ring2 {
        animation: spin 6s linear infinite reverse;
        transform-origin: center;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .hex-core {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hex-core::before {
        content: '';
        width: 18px; height: 18px;
        background: rgba(245, 160, 32, 0.9);
        border-radius: 50%;
        box-shadow: 0 0 16px rgba(245, 160, 32, 0.8), 0 0 32px rgba(245, 160, 32, 0.4);
        animation: pulse-core 2s ease-in-out infinite;
      }
      @keyframes pulse-core {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50%       { transform: scale(1.3); opacity: 1; }
      }

      .root-loading-title {
        color: #f5a020;
        font-size: 22px;
        letter-spacing: 6px;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(245, 160, 32, 0.6);
        animation: flicker 4s ease-in-out infinite;
      }
      @keyframes flicker {
        0%, 95%, 100% { opacity: 1; }
        96%            { opacity: 0.6; }
        97%            { opacity: 1; }
        98%            { opacity: 0.7; }
      }

      .root-loading-sub {
        color: rgba(200, 150, 60, 0.5);
        font-size: 11px;
        letter-spacing: 3px;
        margin-top: -24px;
      }

      .progress-wrap {
        width: 240px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .progress-bar {
        width: 100%;
        height: 2px;
        background: rgba(245, 160, 32, 0.1);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .progress-bar::after {
        content: '';
        position: absolute;
        left: -60%;
        top: 0; bottom: 0;
        width: 60%;
        background: linear-gradient(90deg, transparent, #f5a020, rgba(245, 160, 32, 0.3));
        animation: progress-slide 1.8s ease-in-out infinite;
        border-radius: 2px;
      }
      @keyframes progress-slide {
        0%   { left: -60%; }
        100% { left: 110%; }
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        color: rgba(200, 150, 60, 0.4);
        font-size: 10px;
        letter-spacing: 1px;
      }

      .data-dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .data-dots span {
        width: 4px; height: 4px;
        background: #f5a020;
        border-radius: 50%;
        animation: dot-blink 1.2s ease-in-out infinite;
        box-shadow: 0 0 6px rgba(245, 160, 32, 0.8);
      }
      .data-dots span:nth-child(2) { animation-delay: 0.2s; }
      .data-dots span:nth-child(3) { animation-delay: 0.4s; }
      .data-dots span:nth-child(4) { animation-delay: 0.6s; }
      .data-dots span:nth-child(5) { animation-delay: 0.8s; }
      @keyframes dot-blink {
        0%, 100% { opacity: 0.2; transform: scaleY(1); }
        50%       { opacity: 1;   transform: scaleY(2.5); }
      }

      .particle {
        position: absolute;
        width: 2px; height: 2px;
        background: rgba(245, 160, 32, 0.6);
        border-radius: 50%;
        animation: float-up linear infinite;
      }
      @keyframes float-up {
        0%   { transform: translateY(0) translateX(0); opacity: 0; }
        10%  { opacity: 0.8; }
        90%  { opacity: 0.4; }
        100% { transform: translateY(-100vh) translateX(var(--dx, 20px)); opacity: 0; }
      }
    </style>
